name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core deps (no extras, no NTL backend specifics)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Ruff
        run: ruff check .
      - name: Black (check)
        run: black --check .
      - name: Pytest (CPU, no network)
        env:
          NTL_ETF_NO_NETWORK: "1"
        run: pytest -q
