# configs/regions.yaml — region -> sector candidate catalog (OWNER: Phase A.1 / Task N4).
# Unified schema per DEVPLAN.md Appendix A.6. Phase B (panel) and Phase D (eval strata) CONSUME
# this file; they do not author it. Geometry (bbox) is owned here.
#
# ALL pairings are HYPOTHESES, validated/pruned by the Phase B correlation pre-screen (P3) with
# strict no-look-ahead. Bounding boxes are approximate (decimal degrees, order [W, S, E, N] =
# [min_lon, min_lat, max_lon, max_lat], EPSG:4326); refine to a shapefile under data/external/
# only when a bbox is too coarse (e.g. the Permian Basin is a polygon, not a rectangle).
#
# Coverage invariant (asserted in tests): every SPDR ticker appears in >=1 region's
# candidate_sectors; XLI/XLE/XLY/XLK/XLV have >=2 candidate regions (so H2 is not n=1, Risk R7).
schema_version: 1

