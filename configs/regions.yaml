# Primary NTL feature channels fed to models (Risk R25: pick a primary set; the remaining
# features in ntl_features.parquet are QA/diagnostic only, not pooled as separate model series).
features:
  - ntl_sum
  - ntl_mean
  - ntl_lit_frac

# Named hypothesis pairs consumed by Phase D for H2/H3 stratification (the canonical, force-kept
# multi- vs single-region classification, independent of pre-screen noise).
hypothesis_pairs:
  H2_multiregion: { sector: XLI, regions: [pearl_river_delta, yangtze_river_delta] }
  H3_singleregion: { sector: XLE, regions: [permian_basin] }
